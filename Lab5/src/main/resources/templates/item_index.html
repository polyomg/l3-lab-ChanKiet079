<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Items</title>
</head>
<body>
<h2>Items</h2>
<ul>
    <th:block th:each="item : ${items}">
        <li>
            <span th:text="${item.name}">name</span>
            (<span th:text="${item.price}">price</span>)
            :: [<a th:href="@{|/cart/add/${item.id}|}">Add To Cart</a>]
        </li>
    </th:block>
</ul>
<br/>
<a href="/cart/view">View cart</a>
</body>
</html>

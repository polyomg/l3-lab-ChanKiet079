<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Cart</title>
</head>
<body>
<h2>Shopping Cart</h2>

<table style="width:100%; border: 1px solid black; border-collapse: collapse;">

    <tr>
        <th>Id</th>
        <th>Name</th>
        <th>Price</th>
        <th>Quantity</th>
        <th>Amount</th>
        <th></th>
    </tr>

    <!-- đúng cú pháp: form nằm bên trong td, không lồng tr -->
    <tr th:each="item : ${cart.items}">
        <td th:text="${item.id}"></td>
        <td th:text="${item.name}"></td>
        <td th:text="${item.price}"></td>
        <td>
            <form th:action="@{|/cart/update/${item.id}|}" method="post">
                <input type="number" name="qty" min="0"
                       th:value="${item.qty}"
                       style="width:50px"
                       onblur="this.form.submit()" />
            </form>
        </td>
        <td th:text="${item.price * item.qty}"></td>
        <td>
            <a th:href="@{|/cart/remove/${item.id}|}">Remove</a>
        </td>
    </tr>
</table>

<p>Total items: <span th:text="${cart.count}"></span></p>
<p>Total amount: <span th:text="${cart.amount}"></span></p>

<a href="/cart/clear">Clear Cart</a> |
<a href="/item/index">Add more</a>

</body>
</html>
